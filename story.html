<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OUR STORY | K & M</title>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400&family=Noto+Serif+JP:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root { --bg-color: #f9f7f2; --text-color: #4a4238; --accent-color: #a68b6d; --font-en: 'Lato', sans-serif; --font-jp: 'Noto Serif JP', serif; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg-color); color: var(--text-color); font-family: var(--font-jp); }
        
        nav { position: fixed; top: 0; width: 100%; padding: 25px; display: flex; align-items: center; z-index: 2000; }
        .menu-trigger { font-family: var(--font-en); font-size: 1.1rem; letter-spacing: 0.2em; cursor: pointer; background: none; border: none; color: var(--text-color); display: flex; align-items: center; gap: 10px; }
        .menu-icon { width: 24px; height: 14px; position: relative; }
        .menu-icon span { position: absolute; width: 100%; height: 1px; background: var(--text-color); left: 0; }
        .menu-icon span:nth-child(1) { top: 0; } .menu-icon span:nth-child(2) { bottom: 0; }
        .menu-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-color); z-index: 3000; display: flex; flex-direction: column; justify-content: center; align-items: center; opacity: 0; visibility: hidden; transition: 0.5s; }
        .menu-overlay.active { opacity: 1; visibility: visible; }
        .nav-list { list-style: none; text-align: center; } .nav-list li { margin: 25px 0; } .nav-list a { text-decoration: none; color: var(--text-color); font-family: var(--font-en); font-size: 1.4rem; }
        .nav-list span { display: block; font-size: 0.6rem; font-family: var(--font-jp); color: var(--accent-color); }

        .container { padding: 120px 20px 60px; text-align: center; }
        .en-title { font-family: var(--font-en); font-size: 2.5rem; font-weight: 300; margin-bottom: 10px; }
        .map-section { position: relative; width: 100%; max-width: 500px; margin: 40px auto; }
        
        /* 簡易日本地図SVGのデザイン */
        .japan-map { width: 100%; height: auto; fill: #e0dcd0; stroke: #fff; stroke-width: 1; }
        .pin { fill: var(--accent-color); cursor: pointer; transition: 0.3s; }
        .pin:hover { fill: #8d745a; r: 8; }

        .story-display { margin-top: 30px; padding: 20px; background: #fff; border-radius: 4px; min-height: 150px; }
        .story-display img { width: 100%; border-radius: 2px; margin-bottom: 15px; display: none; }
        .story-display.active img { display: block; }
        .story-display h3 { font-size: 1.2rem; margin-bottom: 10px; }
        .story-display p { font-size: 0.85rem; line-height: 1.6; }

        .hint { font-size: 0.7rem; color: #999; margin-top: 10px; }
    </style>
</head>
<body>
    <nav>
        <button class="menu-trigger" onclick="toggleMenu()"><div class="menu-icon"><span></span><span></span></div><span>K & M</span></button>
    </nav>
    <div class="menu-overlay" id="menuOverlay">
        <div style="position:absolute; top:25px; left:25px;" onclick="toggleMenu()">CLOSE —</div>
        <ul class="nav-list">
            <li><a href="index.html">HOME<span>ホーム</span></a></li>
            <li><a href="prologue.html">PROLOGUE<span>感謝の気持ち</span></a></li>
            <li><a href="profile.html">PROFILE<span>新郎新婦紹介</span></a></li>
            <li><a href="story.html">OUR STORY<span>二人の歩み</span></a></li>
            <li><a href="seating.html">SEATING GUIDE<span>お席案内</span></a></li>
            <li><a href="cuisine.html">CUISINE<span>お料理</span></a></li>
            <li><a href="memories.html">SPECIAL MEMORIES<span>あなたへの手紙</span></a></li>
        </ul>
    </div>

    <div class="container">
        <h1 class="en-title">Our Story</h1>
        <p style="font-size:0.7rem; letter-spacing:0.3em;">思い出の地をタップ</p>

        <div class="map-section">
            <svg class="japan-map" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
                <!-- 簡易地図：形はイメージ -->
                <path d="M400,100 L420,50 L450,60 L440,110 Z" /> <!-- 北海道 -->
                <path d="M350,150 L380,180 L360,300 L300,320 L280,250 Z" /> <!-- 本州 -->
                <circle class="pin" cx="360" cy="220" r="6" onclick="showStory(1)" /> <!-- 東北 -->
                <circle class="pin" cx="330" cy="280" r="6" onclick="showStory(2)" /> <!-- 東京 -->
                <circle class="pin" cx="300" cy="300" r="6" onclick="showStory(3)" /> <!-- 静岡 -->
            </svg>
        </div>

        <div class="story-display" id="storyBox">
            <img id="storyImg" src="" alt="Story Photo">
            <h3 id="storyTitle">Memory</h3>
            <p id="storyDesc">地図のピンをタップして、二人の思い出を覗いてみてください。</p>
        </div>
        <p class="hint">※各地点に大切なエピソードがあります</p>
    </div>

    <script>
        const stories = {
            1: { title: "初めての二人旅", desc: "付き合って初めての旅行は、青森のねぶた祭りでした。圧倒的な熱気に包まれて、二人の距離がぐっと縮まった大切な場所です。", img: "https://images.unsplash.com/photo-1542362567-b045002693ef?auto=format&fit=crop&q=80&w=800" },
            2: { title: "東京での出会い", desc: "大学時代のサークルで出会った二人。放課後に何度も歩いた吉祥寺の井の頭公園は、今でも初心に帰れる特別な場所です。", img: "https://images.unsplash.com/photo-1503899036084-c55cdd92da26?auto=format&fit=crop&q=80&w=800" },
            3: { title: "プロポーズの海", desc: "健太の地元、静岡の海岸。夕日が沈む瞬間、「ずっと一緒にいよう」という言葉とともに指輪を受け取りました。", img: "https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&q=80&w=800" }
        };

        function showStory(id) {
            const box = document.getElementById('storyBox');
            const img = document.getElementById('storyImg');
            const title = document.getElementById('storyTitle');
            const desc = document.getElementById('storyDesc');
            
            box.style.opacity = 0;
            setTimeout(() => {
                box.classList.add('active');
                img.src = stories[id].img;
                title.innerText = stories[id].title;
                desc.innerText = stories[id].desc;
                box.style.opacity = 1;
            }, 300);
        }

        function toggleMenu() { document.getElementById('menuOverlay').classList.toggle('active'); }
    </script>
</body>
</html>
